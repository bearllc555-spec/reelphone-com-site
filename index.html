<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>reelphone — coming soon</title>
<meta name="description" content="Something is coming. A new bear llc property, quietly under construction.">
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFFFFF;
    --ink:#0A0A0A;
    --ink-soft:#3A3D42;
    --slate:#6B6A73;
    --rule:#E5E7EB;
    --blue:#2563EB;
    --blue-deep:#1D4ED8;
    --blue-soft:#EFF3FF;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',-apple-system,system-ui,sans-serif;
    background:var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    display:flex;align-items:center;justify-content:center;
    padding:24px;line-height:1.5;
    font-feature-settings:"ss01","cv11";letter-spacing:-.005em;
  }
  .wrap{max-width:560px;width:100%;text-align:center}
  .logo{
    display:block;
    width:72px;height:72px;
    margin:0 auto 6px;
    color:var(--ink);
  }
  .logo img{width:100%;height:100%;display:block;object-fit:contain}
  @media (max-width:480px){
    .logo{width:60px;height:60px;margin-bottom:4px}
  }
  .brand{
    display:inline-flex;align-items:baseline;
    font-weight:800;font-size:30px;letter-spacing:-.03em;
    color:var(--ink);line-height:1;
    margin-bottom:36px;text-decoration:none;
  }
  .brand .word{font-weight:800;color:var(--ink);text-transform:lowercase}
  .brand .word .dot{color:var(--blue);font-weight:800}
  .brand .ver{font-size:10.5px;font-weight:600;color:var(--slate);margin-left:8px;letter-spacing:0;align-self:center}
  .eyebrow{
    display:inline-flex;align-items:center;gap:.55rem;
    font-size:11.5px;font-weight:700;
    letter-spacing:.08em;text-transform:uppercase;
    color:var(--blue);
    background:var(--blue-soft);
    padding:.45rem .9rem;
    border-radius:999px;
    margin-bottom:22px;
  }
  .eyebrow .pulse{
    width:7px;height:7px;border-radius:50%;
    background:var(--blue);
    animation:pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:1;transform:scale(1)}
    50%{opacity:.45;transform:scale(1.2)}
  }
  h1{
    font-size:38px;
    font-weight:700;
    letter-spacing:-.025em;
    line-height:1.15;
    color:var(--ink);
    margin-bottom:18px;
    text-transform:lowercase;
  }
  h1 em{font-style:normal;color:var(--blue);font-weight:700}
  h1 .slash{color:var(--blue);font-weight:800;letter-spacing:-.05em}
  p.lead{
    font-size:16.5px;color:var(--ink-soft);
    max-width:42ch;margin:0 auto 36px;line-height:1.6;
  }
  .footer{
    margin-top:56px;padding-top:28px;
    border-top:1px solid var(--rule);
    font-size:12.5px;color:var(--slate);
    line-height:1.7;
  }
  .footer .mark-dot{color:var(--blue);font-weight:700}
</style>
</head>
<body>
<main class="wrap">
  <div class="logo">
    <img src="/reel-phone-logo-01.png" alt="reelphone logo" width="72" height="72" />
  </div>
  <span class="brand"><span class="word">reelphone</span><span class="ver">v05</span></span>
  <div><span class="eyebrow"><span class="pulse"></span>in build · coming soon</span></div>
  <h1><span class="slash">/</span>something is <em>coming.</em></h1>
  <p class="lead">a new bear llc property. quietly under construction.</p>
  <div class="footer">reelphone.com &copy; 2026 · a bear llc digital property</div>
</main>
</body>
</html>

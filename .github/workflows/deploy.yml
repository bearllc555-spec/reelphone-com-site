name: Deploy to Cloudflare Pages
on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
      - 'polish/**'
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - name: Compute branch slug (slashes to dashes)
        id: slug
        run: echo "slug=$(echo '${{ github.ref_name }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=reelphone-com --branch=${{ steps.slug.outputs.slug }}

